<style>
:root { --ink:#18212f; --muted:#627084; --surface:#fff; --canvas:#f4f7fb; --line:#dce3ed; --primary:#2457d6; --danger:#b42318; --focus:#f5b700; --radius:12px; }
* { box-sizing:border-box; }
body { margin:0; background:var(--canvas); color:var(--ink); font:15px/1.5 Arial, sans-serif; }
button, input, textarea, select { font:inherit; }
button, select, input, textarea { border-radius:8px; }
button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline:3px solid var(--focus); outline-offset:2px; }
.app-header { align-items:center; background:var(--surface); border-bottom:1px solid var(--line); display:flex; justify-content:space-between; padding:24px max(24px, calc((100% - 1120px) / 2)); }
h1, h2, p { margin:0; } h1 { font-size:28px; } h2 { font-size:20px; }
.eyebrow { color:var(--muted); font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
.app-main { display:grid; gap:20px; margin:0 auto; max-width:1120px; padding:28px 24px 48px; }
.panel, .dashboard-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:24px; box-shadow:0 2px 8px rgb(24 33 47 / 4%); }
.dashboard-card { max-width:260px; } .dashboard-card p { color:var(--muted); } .metric-value { display:block; font-size:36px; font-weight:700; margin-top:4px; }
.panel-heading { align-items:flex-start; display:flex; gap:16px; justify-content:space-between; margin-bottom:20px; }.project-list-heading { align-items:center; }
.form-grid { display:grid; gap:16px; grid-template-columns:repeat(2, minmax(0, 1fr)); }.field-wide { grid-column:1 / -1; }
label { color:var(--ink); display:grid; font-weight:600; gap:6px; } input, textarea, select { background:#fff; border:1px solid #aebaca; color:var(--ink); min-height:40px; padding:8px 10px; } textarea { resize:vertical; }
.form-actions, .dialog-actions { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; margin-top:20px; }
.button { border:1px solid transparent; cursor:pointer; font-weight:700; min-height:40px; padding:8px 14px; }.button[disabled] { cursor:not-allowed; opacity:.6; }.button-primary { background:var(--primary); color:#fff; }.button-secondary { background:#fff; border-color:#aebaca; color:var(--ink); }.button-danger { background:var(--danger); color:#fff; }
.list-controls { display:flex; flex-wrap:wrap; gap:8px; }.list-controls input { min-width:200px; }
.table-wrapper { overflow-x:auto; } table { border-collapse:collapse; min-width:760px; width:100%; } th, td { border-bottom:1px solid var(--line); padding:12px 10px; text-align:left; vertical-align:top; } th { color:var(--muted); font-size:12px; letter-spacing:.04em; text-transform:uppercase; } td:last-child { text-align:right; }.row-actions { display:flex; gap:6px; justify-content:flex-end; }
.empty-state { color:var(--muted); padding:20px 0 0; text-align:center; }.form-errors { background:#fff0ef; border-left:4px solid var(--danger); color:#7a1c14; margin-bottom:16px; padding:10px 12px; }.form-errors ul { margin:0; padding-left:18px; }
.dialog { border:0; border-radius:var(--radius); box-shadow:0 18px 48px rgb(0 0 0 / 22%); color:var(--ink); max-width:680px; padding:24px; width:calc(100% - 32px); }.dialog::backdrop { background:rgb(18 27 40 / 48%); }.dialog-heading { align-items:center; display:flex; justify-content:space-between; }.icon-button { background:transparent; border:0; color:var(--muted); cursor:pointer; font-size:28px; line-height:1; }.project-details { display:grid; gap:12px; grid-template-columns:160px 1fr; margin:24px 0 0; }.project-details dt { color:var(--muted); font-weight:700; }.project-details dd { margin:0; overflow-wrap:anywhere; }.project-details a { color:var(--primary); }.confirm-dialog { max-width:440px; }
.loading-overlay { align-items:center; background:rgb(18 27 40 / 36%); display:flex; inset:0; justify-content:center; position:fixed; z-index:10; }.loading-card { align-items:center; background:#fff; border-radius:10px; display:flex; gap:12px; padding:18px 20px; }.spinner { animation:spin .8s linear infinite; border:3px solid #dce3ed; border-radius:50%; border-top-color:var(--primary); height:24px; width:24px; } @keyframes spin { to { transform:rotate(360deg); } }
.toast { background:var(--ink); border-radius:8px; bottom:24px; color:#fff; max-width:360px; padding:12px 16px; position:fixed; right:24px; z-index:20; }.toast.is-error { background:var(--danger); }.visually-hidden { height:1px; margin:-1px; overflow:hidden; position:absolute; width:1px; clip:rect(0,0,0,0); }
@media (max-width:680px) { .app-header { align-items:flex-start; flex-direction:column; }.panel, .dashboard-card { padding:18px; }.panel-heading, .project-list-heading { align-items:flex-start; flex-direction:column; }.form-grid { grid-template-columns:1fr; }.field-wide { grid-column:auto; }.list-controls, .list-controls input { width:100%; }.project-details { grid-template-columns:1fr; gap:4px; }.project-details dd { margin-bottom:10px; } }
</style>
